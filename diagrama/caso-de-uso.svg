<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Diagrama de casos de uso — MedLembrete</title>
  <desc>Diagrama UML de casos de uso do sistema MedLembrete, com um ator Usuário e nove casos de uso dentro do limite do sistema.</desc>

  <!-- System boundary -->
  <rect x="120" y="20" width="500" height="580" rx="12" fill="none" stroke="#aaa" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="370" y="44" text-anchor="middle" font-size="13" fill="#888" font-family="Arial,sans-serif">MedLembrete — sistema</text>

  <!-- Group label: Autenticação -->
  <text x="370" y="72" text-anchor="middle" font-size="11" fill="#aaa" font-family="Arial,sans-serif">Autenticação</text>

  <!-- UC01 -->
  <ellipse cx="255" cy="105" rx="88" ry="22" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="255" y="105" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#085041" font-family="Arial,sans-serif">UC01 · Cadastrar-se</text>

  <!-- UC02 -->
  <ellipse cx="480" cy="105" rx="88" ry="22" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="480" y="105" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#085041" font-family="Arial,sans-serif">UC02 · Fazer login</text>

  <!-- Group label: Medicamentos -->
  <text x="370" y="152" text-anchor="middle" font-size="11" fill="#aaa" font-family="Arial,sans-serif">Medicamentos</text>

  <!-- UC03 -->
  <ellipse cx="240" cy="195" rx="96" ry="22" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="240" y="195" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C" font-family="Arial,sans-serif">UC03 · Cadastrar med.</text>

  <!-- UC04 -->
  <ellipse cx="495" cy="195" rx="96" ry="22" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="495" y="195" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C" font-family="Arial,sans-serif">UC04 · Definir horários</text>

  <!-- UC05 -->
  <ellipse cx="240" cy="290" rx="96" ry="22" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="240" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C" font-family="Arial,sans-serif">UC05 · Painel diário</text>

  <!-- UC06 -->
  <ellipse cx="495" cy="290" rx="96" ry="22" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="495" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C" font-family="Arial,sans-serif">UC06 · Registrar dose</text>

  <!-- UC07 -->
  <ellipse cx="240" cy="385" rx="96" ry="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="240" y="385" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489" font-family="Arial,sans-serif">UC07 · Ver histórico</text>

  <!-- UC08 -->
  <ellipse cx="495" cy="385" rx="96" ry="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="495" y="385" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489" font-family="Arial,sans-serif">UC08 · Editar med.</text>

  <!-- UC09 -->
  <ellipse cx="370" cy="480" rx="108" ry="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="370" y="480" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489" font-family="Arial,sans-serif">UC09 · Relatório de adesão</text>

  <!-- Actor stick figure -->
  <circle cx="52" cy="290" r="16" fill="none" stroke="#666" stroke-width="1.5"/>
  <line x1="52" y1="306" x2="52" y2="360" stroke="#666" stroke-width="1.5"/>
  <line x1="52" y1="325" x2="28" y2="345" stroke="#666" stroke-width="1.5"/>
  <line x1="52" y1="325" x2="76" y2="345" stroke="#666" stroke-width="1.5"/>
  <line x1="52" y1="360" x2="34" y2="390" stroke="#666" stroke-width="1.5"/>
  <line x1="52" y1="360" x2="70" y2="390" stroke="#666" stroke-width="1.5"/>
  <text x="52" y="408" text-anchor="middle" font-size="12" fill="#555" font-family="Arial,sans-serif">Usuário</text>

  <!-- Associations -->
  <line x1="76" y1="270" x2="167" y2="105" stroke="#bbb" stroke-width="0.8"/>
  <line x1="76" y1="270" x2="392" y2="105" stroke="#bbb" stroke-width="0.8"/>
  <line x1="76" y1="280" x2="144" y2="195" stroke="#bbb" stroke-width="0.8"/>
  <line x1="76" y1="280" x2="399" y2="195" stroke="#bbb" stroke-width="0.8"/>
  <line x1="68" y1="290" x2="144" y2="290" stroke="#bbb" stroke-width="0.8"/>
  <line x1="68" y1="290" x2="399" y2="290" stroke="#bbb" stroke-width="0.8"/>
  <line x1="76" y1="310" x2="144" y2="385" stroke="#bbb" stroke-width="0.8"/>
  <line x1="76" y1="310" x2="399" y2="385" stroke="#bbb" stroke-width="0.8"/>
  <line x1="68" y1="340" x2="262" y2="480" stroke="#bbb" stroke-width="0.8"/>

  <!-- Legend -->
  <ellipse cx="145" cy="562" rx="14" ry="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="165" y="566" font-size="11" fill="#444" font-family="Arial,sans-serif">Autenticação</text>
  <ellipse cx="270" cy="562" rx="14" ry="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="290" y="566" font-size="11" fill="#444" font-family="Arial,sans-serif">Medicamentos</text>
  <ellipse cx="415" cy="562" rx="14" ry="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="435" y="566" font-size="11" fill="#444" font-family="Arial,sans-serif">Relatórios e histórico</text>
</svg>